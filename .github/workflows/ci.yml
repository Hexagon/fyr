name: Quick Checks

on:
  push:
    branches:
      - "**"

jobs:
  quick-backend:
    name: Quick Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Test (workspace)
        run: cargo test --workspace --all-targets

      - name: Cargo Check (server)
        run: cargo check -p server

  quick-frontend:
    name: Quick Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/ui/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: crates/ui/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  quick-docs-build:
    name: Quick Docs Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs/build/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Documentation
        run: npm run build

      - name: Verify Kiwix Compliance
        run: npm run verify:kiwix
