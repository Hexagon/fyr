name: Stable Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Stable version tag (for example v0.4.1)"
        required: true
        type: string

jobs:
  preflight:
    name: Stable Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version format: $TAG"
              exit 1
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure Commit Is On Main
        shell: bash
        run: |
          git fetch origin main
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Stable release is only allowed from commits reachable from main."
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Test (workspace)
        run: cargo test --workspace --all-targets

      - name: Cargo Check (server)
        run: cargo check -p server

      - name: Setup Node (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: crates/ui/frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: crates/ui/frontend
        run: npm ci

      - name: Build Frontend
        working-directory: crates/ui/frontend
        run: npm run build

      - name: Setup Node (docs)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs/build/package-lock.json

      - name: Install Docs Dependencies
        working-directory: docs/build
        run: npm ci

      - name: Build Docs
        working-directory: docs/build
        run: npm run build

      - name: Verify Kiwix Compliance
        working-directory: docs/build
        run: npm run verify:kiwix

  publish-stable-image:
    name: Publish Stable Docker Image
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Release Tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Stable Multi-Arch Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            hexagon/fyr:${{ steps.release_tag.outputs.tag }}
            hexagon/fyr:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
